<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Rus tili PRO — Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0d0d18; --card:rgba(255,255,255,.06); --line:rgba(255,255,255,.1);
  --txt:#f1f0fa; --mut:#9b98b8; --acc:#8e7bff; --acc2:#22d3ee;
  --ok:#34d399; --bad:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before,body::after{content:"";position:fixed;z-index:-2;width:65vmax;height:65vmax;border-radius:50%;filter:blur(100px);opacity:.14;animation:blob 24s ease-in-out infinite alternate}
body::before{background:#6d5dfc;top:-28vmax;left:-22vmax}
body::after{background:#0ea5e9;bottom:-28vmax;right:-22vmax;animation-delay:-12s}
@keyframes blob{to{transform:translate(7vmax,5vmax) scale(1.18)}}
#bg{position:fixed;inset:0;z-index:-1}
#app{max-width:520px;margin:0 auto;padding:18px 16px 48px}
.glass{background:var(--card);border:1px solid var(--line);border-radius:18px;backdrop-filter:blur(14px)}
.center{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:8vh;gap:14px}
.logo{width:86px;height:86px;border-radius:28px;background:linear-gradient(135deg,#8e7bff,#22d3ee);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 40px rgba(142,123,255,.45);animation:floaty 3.5s ease-in-out infinite}
.logo svg{width:44px;height:44px;color:#fff}
.logo.sad{background:linear-gradient(135deg,#475069,#232a3d);box-shadow:none}
@keyframes floaty{50%{transform:translateY(-8px)}}
.title{font-size:30px}
.grad-txt{background:linear-gradient(90deg,#8e7bff,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--mut)}
.form{width:100%;padding:18px;display:flex;flex-direction:column;gap:11px}
.tabs{display:flex;background:rgba(0,0,0,.28);border-radius:12px;padding:4px}
.tab{flex:1;padding:9px;border:0;border-radius:9px;background:none;color:var(--mut);font-weight:600;cursor:pointer;transition:.25s}
.tab.on{background:var(--acc);color:#fff}
.inp{padding:13px 15px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.28);color:var(--txt);font-size:15px;outline:none;transition:.25s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(142,123,255,.2)}
.btn{display:block;width:100%;padding:13px;margin-top:10px;border:1px solid var(--line);border-radius:13px;background:var(--card);color:var(--txt);font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn.grad{background:linear-gradient(90deg,#8e7bff,#22d3ee);border:0;color:#fff;box-shadow:0 6px 24px rgba(142,123,255,.4)}
.head{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:16px}
.ava{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#8e7bff,#22d3ee);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ava svg{width:22px;height:22px;color:#fff}
.xp{margin-left:auto;display:flex;align-items:center;gap:5px;color:#fbbf24;font-size:14px}
.xp svg{width:17px;height:17px}
.ghost{border:0;background:none;color:var(--mut);cursor:pointer;padding:6px}
.ghost svg{width:21px;height:21px}
.sec{margin:6px 2px 12px;font-size:19px}
.lvl,.lesson{display:flex;align-items:center;gap:14px;padding:15px;margin-bottom:12px;cursor:pointer;position:relative;transition:transform .18s,border-color .18s;animation:fadeUp .4s ease both}
.lvl:active,.lesson:active{transform:scale(.98)}
.lvl:hover,.lesson:hover{border-color:var(--acc)}
.lvl-ic{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,rgba(142,123,255,.25),rgba(34,211,238,.25));display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--acc2)}
.lvl-ic svg{width:25px;height:25px}
.lvl-body{flex:1;min-width:0}
.lvl-body small{display:block;color:var(--mut);margin-top:2px;font-size:12.5px}
.num{width:36px;height:36px;border-radius:50%;background:rgba(142,123,255,.18);color:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.num.done{background:var(--ok);color:#04291c}
.locked{opacity:.45;filter:grayscale(.6)}
.lock{position:absolute;right:15px;color:var(--mut)}
.lock svg{width:19px;height:19px}
.bar{height:7px;border-radius:5px;background:rgba(0,0,0,.35);margin:7px 0 4px;overflow:hidden}
.fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#8e7bff,#22d3ee);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.mut{color:var(--mut)}
.foot{text-align:center;color:var(--mut);font-size:12.5px;margin-top:18px}
.qcard{padding:22px 18px;margin-bottom:14px;animation:fadeUp .35s ease both}
.qcard h3{font-size:18px;line-height:1.45}
.opt{display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:10px;font-size:15px;color:var(--txt);cursor:pointer;transition:.2s;animation:fadeUp .4s ease both}
.opt:disabled{cursor:default}
.opt.ok{background:rgba(52,211,153,.2);border-color:var(--ok)}
.opt.bad{background:rgba(248,113,113,.18);border-color:var(--bad)}
.izoh{padding:13px 15px;margin:4px 0 10px;color:#cfcbe8;font-size:14px;line-height:1.5}
.pct{font-size:56px;font-weight:900}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fade{animation:fadeUp .35s ease both}
@keyframes shake{20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease}
@keyframes pop{50%{transform:scale(1.05)}}
.pop{animation:pop .35s ease}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#232136;border:1px solid var(--line);color:var(--txt);padding:11px 18px;border-radius:13px;z-index:99;animation:fadeUp .3s ease both;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:88vw;text-align:center}
.confetti{position:fixed;top:-12px;width:9px;height:14px;border-radius:2px;z-index:98;animation:confetti 2.6s linear forwards}
@keyframes confetti{to{transform:translateY(108vh) rotate(720deg)}}
</style>
</head>

/* Orqa fon: suzuvchi harflar (optimallashtirilgan canvas) */
(function () {
  const cv = document.getElementById("bg");
  const cx = cv.getContext("2d");
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const GLYPHS = ["А","Б","В","Д","Ж","И","К","Л","Н","П","С","У","Ф","Ш","Э","Ю","Я","★","✦","♪","❄"];
  let W = 0, H = 0, items = [], running = true;
  function make() {
    return {
      x: Math.random() * W, y: H + 60 * DPR,
      s: (9 + Math.random() * 16) * DPR,
      vy: (0.12 + Math.random() * 0.35) * DPR,
      vx: (Math.random() - 0.5) * 0.15 * DPR,
      a: 0.05 + Math.random() * 0.11,
      g: GLYPHS[(Math.random() * GLYPHS.length) | 0],
      r: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.005,
      c: Math.random() > 0.5 ? "#8e7bff" : "#22d3ee",
    };
  }
  function resize() {
    W = cv.width = innerWidth * DPR; H = cv.height = innerHeight * DPR;
    cv.style.width = innerWidth + "px"; cv.style.height = innerHeight + "px";
    const n = Math.min(34, Math.round((innerWidth * innerHeight) / 24000));
    items = Array.from({ length: n }, () => { const p = make(); p.y = Math.random() * H; return p; });
  }
  function tick() {
    if (!running) return;
    cx.clearRect(0, 0, W, H);
    for (const p of items) {
      p.y -= p.vy; p.x += p.vx; p.r += p.vr;
      if (p.y < -50) Object.assign(p, make());
      cx.save(); cx.translate(p.x, p.y); cx.rotate(p.r);
      cx.globalAlpha = p.a; cx.fillStyle = p.c; cx.font = p.s + "px sans-serif";
      cx.fillText(p.g, 0, 0); cx.restore();
    }
    requestAnimationFrame(tick);
  }
  document.addEventListener("visibilitychange", () => {
    running = !document.hidden; if (running) requestAnimationFrame(tick);
  });
  addEventListener("resize", resize, { passive: true });
  resize(); tick();
})();

/* Ma'lumotlarni saqlash: localStorage + Telegram CloudStorage */
function readDB() { try { return JSON.parse(localStorage.getItem("rt_db")) || { users: {} }; } catch (e) { return { users: {} }; } }
function writeDB(d) {
  localStorage.setItem("rt_db", JSON.stringify(d));
  if (tg && tg.CloudStorage) tg.CloudStorage.setItem("rt_db", JSON.stringify(d), function () {});
}
function hash(s) { let h = 9; for (let i = 0; i < s.length; i++) h = Math.imul(h ^ s.charCodeAt(i), 387420489); return (h >>> 0).toString(36); }

let db = readDB();
let me = null;
let quiz = null;
const app = document.getElementById("app");

if (tg && tg.CloudStorage) tg.CloudStorage.getItem("rt_db", function (err, val) {
  if (!err && val && !localStorage.getItem("rt_db")) { localStorage.setItem("rt_db", val); db = readDB(); }
});

/* Yordamchilar */
function user() { return db.users[me]; }
const XP_RANKS = [[1500, "🏆 PRO"], [800, "🥇 Usta"], [400, "🥈 Bilimdon"], [150, "🥉 O'rganuvchi"], [0, "🌱 Yangi boshlovchi"]];
function rank(xp) { for (const r of XP_RANKS) if (xp >= r[0]) return r[1]; }
function best(L, i) { const u = user(); return (u.progress[L] && u.progress[L][i]) || 0; }
function levelDone(L) { return DATA[L].darslar.every((_, i) => best(L, i) >= PASS); }
function levelOpen(L) { const idx = LEVELS.indexOf(L); return idx === 0 || levelDone(LEVELS[idx - 1]); }
function lessonOpen(L, i) { return i === 0 ? levelOpen(L) : best(L, i - 1) >= PASS; }
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0; const t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

function toast(msg) {
  const t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2600);
}
function confetti() {
  const colors = ["#8e7bff", "#22d3ee", "#34d399", "#fbbf24", "#f87171"];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement("i"); c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = colors[i % colors.length];
    c.style.animationDelay = Math.random() * 0.6 + "s";
    document.body.appendChild(c); setTimeout(() => c.remove(), 3400);
  }
}

/* Kirish / Ro'yxatdan o'tish */
let authMode = "login";
function setMode(m) { authMode = m; authScreen(); }
function authScreen() {
  const tgName = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "";
  app.innerHTML = `<div class="center fade"><div class="logo">${ICON.rocket}</div><h1 class="title">Rus tili <span class="grad-txt">PRO</span></h1><p class="sub">A1 dan B2 gacha — o'ynab o'rganing 🎮</p><div class="glass form"><div class="tabs"><button class="tab ${authMode === "login" ? "on" : ""}" onclick="setMode('login')">Kirish</button><button class="tab ${authMode === "register" ? "on" : ""}" onclick="setMode('register')">Ro'yxatdan o'tish</button></div><input id="f-name" class="inp" placeholder="👤 Ism (login)" value="${authMode === "register" ? tgName : ""}" maxlength="20"><input id="f-pass" class="inp" type="password" placeholder="🔑 Parol" maxlength="30"><button class="btn grad" onclick="submitAuth()">${authMode === "login" ? "🚀 Kirish" : "✨ Boshlash"}</button></div></div>`;

function submitAuth() {
  const name = document.getElementById("f-name").value.trim();
  const pass = document.getElementById("f-pass").value;
  if (name.length < 2) return toast("Ism kamida 2 harf bo'lsin");
  if (pass.length < 4) return toast("Parol kamida 4 belgi bo'lsin");
  if (authMode === "register") {
    if (db.users[name]) return toast("Bu ism band — Kirish bo'limini tanlang");
    db.users[name] = { pass: hash(pass), xp: 0, progress: {}, created: Date.now() };

}
function logout() { me = null; localStorage.removeItem("rt_me"); authScreen(); }

/* Bosh menyu */
function home() {
  const u = user();
  const cards = LEVELS.map(L => {
    const d = DATA[L]; const open = levelOpen(L);
    const done = d.darslar.filter((_, i) => best(L, i) >= PASS).length;
    const pct = Math.round(done / d.darslar.length * 100);
    const prev = LEVELS[LEVELS.indexOf(L) - 1];
    return `<div class="lvl glass ${open ? "" : "locked"}" onclick="${open ? `openLevel('${L}')` : `toast('🔒 Avval ${prev} ni tugating!')`}"><div class="lvl-ic">${ICON[LEVEL_ICON[L]]}</div><div class="lvl-body"><b>${d.nom}</b><small>${d.tavsif}</small><div class="bar"><div class="fill" style="width:${pct}%"></div></div><small class="mut">${done}/${d.darslar.length} dars · ${pct}%</small></div>${open ? "" : `<div class="lock">${ICON.lock}</div>`}</div>`;
  }).join("");
  app.innerHTML = `<div class="fade"><div class="head glass"><div class="ava">${ICON.user}</div><div><b>${me}</b><br><small class="mut">${rank(u.xp)}</small></div><div class="xp">${ICON.flame}<b>${u.xp}</b> XP</div><button class="ghost" onclick="logout()">${ICON.out}</button></div><h2 class="sec">📚 Darajalar</h2>${cards}<p class="foot">✨ Har darsni ${PASS}%+ bilan tugatsangiz, keyingisi ochiladi</p></div>`;
}

/* Daraja: darslar ro'yxati */
function openLevel(L) {
  const d = DATA[L];
  const rows = d.darslar.map((dars, i) => {
    const open = lessonOpen(L, i); const b = best(L, i);
    const stars = b >= 95 ? "⭐⭐⭐" : b >= 85 ? "⭐⭐" : b >= PASS ? "⭐" : "";
    return `<div class="lesson glass ${open ? "" : "locked"}" onclick="${open ? `startLesson('${L}',${i})` : "toast('🔒 Oldingi darsni tugating!')"}"><div class="num ${b >= PASS ? "done" : ""}">${b >= PASS ? "✓" : i + 1}</div><div class="lvl-body"><b>${dars.nom}</b><small class="mut">${dars.savollar.length} savol ${b ? "· eng yaxshi: " + b + "% " + stars : ""}</small></div>${open ? "" : `<div class="lock">${ICON.lock}</div>`}</div>`;
  }).join("");
  app.innerHTML = `<div class="fade"><div class="head glass"><button class="ghost" onclick="home()">${ICON.back}</button><div><b>${d.nom}</b><br><small class="mut">${d.tavsif}</small></div></div>${rows}</div>`;
}

/* Test */
function startLesson(L, i) {
  quiz = { L: L, i: i, qs: shuffle(DATA[L].darslar[i].savollar.slice()), qi: 0, ok: 0 };
  question();
}
function question() {
  const q = quiz.qs[quiz.qi];
  const opts = q.v.map((v, i) => `<button class="opt glass" onclick="answer(${i})">${v}</button>`).join("");
  app.innerHTML = `<div class="fade"><div class="head glass"><button class="ghost" onclick="openLevel('${quiz.L}')">${ICON.back}</button><div style="flex:1"><div class="bar"><div class="fill" style="width:${quiz.qi / quiz.qs.length * 100}%"></div></div><small class="mut">${quiz.qi + 1}/${quiz.qs.length} · ✅ ${quiz.ok}</small></div></div><div class="qcard glass"><h3>${q.s}</h3></div><div id="opts">${opts}</div><div id="after"></div></div>`;
}
function answer(i) {
  const q = quiz.qs[quiz.qi];
  const btns = document.querySelectorAll(".opt");
  btns.forEach(b => b.disabled = true);
  btns[q.t].classList.add("ok");
  if (i === q.t) { quiz.ok++; btns[i].classList.add("pop"); }
  else { btns[i].classList.add("bad", "shake"); }
  quiz.qi++;
  const last = quiz.qi >= quiz.qs.length;
  document.getElementById("after").innerHTML = `<div class="izoh glass fade">💡 ${q.i}</div><button class="btn grad fade" onclick="${last ? "finish()" : "question()"}">${last ? "🏁 Natija" : "➡️ Keyingi"}</button>`;
}

/* Natija + qulf ochish */
function finish() {
  const total = quiz.qs.length, pct = Math.round(quiz.ok / total * 100), passed = pct >= PASS;
  const u = user(); const L = quiz.L, i = quiz.i;
  const old = best(L, i);
  if (!u.progress[L]) u.progress[L] = {};
  if (pct > old) u.progress[L][i] = pct;
  const gained = quiz.ok * 10 + (passed ? 20 : 0);
  u.xp += gained; writeDB(db);
  let unlockMsg = "";
  if (passed) {
    confetti();
    if (i + 1 < DATA[L].darslar.length) unlockMsg = `🔓 Yangi dars ochildi: <b>${DATA[L].darslar[i + 1].nom}</b>`;
    else {
      const nxt = LEVELS[LEVELS.indexOf(L) + 1];
      if (nxt && levelOpen(nxt)) unlockMsg = `🎉 <b>${DATA[nxt].nom}</b> darajasi ochildi!`;
      else if (!nxt && levelDone(L)) unlockMsg = "🏆 Siz BARCHA darajalarni tugatdingiz!";
    }
  }
  app.innerHTML = `<div class="center fade"><div class="logo ${passed ? "" : "sad"}">${passed ? ICON.trophy : ICON.book}</div><h1 class="title">${passed ? "Ajoyib!" : "Yana urinib ko'ring"}</h1><div class="pct grad-txt" id="pct">0%</div><p class="sub">✅ ${quiz.ok}/${total} to'g'ri · +${gained} XP</p>${unlockMsg ? `<div class="izoh glass">${unlockMsg}</div>` : ""}<button class="btn grad" onclick="startLesson('${L}',${i})">🔄 Qayta yechish</button><button class="btn" onclick="openLevel('${L}')">📚 Darslar</button><button class="btn" onclick="home()">🏠 Bosh menyu</button></div>`;
  let n = 0; const el = document.getElementById("pct");
  const timer = setInterval(() => { n += 2; if (n >= pct) { n = pct; clearInterval(timer); } el.textContent = n + "%"; }, 20);
}

/* Ishga tushirish */
me = localStorage.getItem("rt_me");
if (me && db.users[me]) home(); else { me = null; authScreen(); }
</script>
